version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# Te Quiero Metales — ERP de Gestión de Metales Preciosos
#
# Uso rápido:
#   1. cp .env.example .env   (y editar JWT_SECRET / JWT_REFRESH_SECRET)
#   2. docker compose up -d
#   3. docker compose exec backend npx prisma db seed
#
# Puertos por defecto:
#   Frontend  → http://localhost:3000
#   Backend   → http://localhost:3001/api/v1
#   Swagger   → http://localhost:3001/api/docs
#   Postgres  → localhost:5432
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tequierometales-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-tequierometales}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tequierometales
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tequierometales}
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

  # ── API Backend (NestJS) ──────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: tequierometales-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Base de datos (apunta al servicio 'postgres' dentro de la red Docker)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tequierometales}

      # JWT — OBLIGATORIO cambiar en producción
      JWT_SECRET:              ${JWT_SECRET:?Falta JWT_SECRET en .env}
      JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET:?Falta JWT_REFRESH_SECRET en .env}
      JWT_EXPIRES_IN:          ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN:  ${JWT_REFRESH_EXPIRES_IN:-7d}

      # Servidor
      PORT:      3001
      NODE_ENV:  ${NODE_ENV:-production}

      # CORS — debe coincidir con la URL pública del frontend
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

      # Almacenamiento de archivos
      STORAGE_DRIVER:     ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_PATH: /app/uploads

      # Cron de precios
      PRICE_UPDATE_INTERVAL_SECONDS: ${PRICE_UPDATE_INTERVAL_SECONDS:-30}
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    volumes:
      - uploads_data:/app/uploads
    networks:
      - tequierometales
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO /dev/null http://localhost:3001/api/docs || exit 1
      interval:     15s
      timeout:      10s
      retries:      5
      start_period: 40s

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        # Se incrusta en el bundle en tiempo de compilación (NEXT_PUBLIC_*)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    container_name: tequierometales-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    networks:
      - tequierometales

# ──────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # Datos persistentes de PostgreSQL
  uploads_data:    # Documentos de clientes subidos

networks:
  tequierometales:
    driver: bridge
